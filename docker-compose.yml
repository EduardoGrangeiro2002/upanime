services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7891:7891"
    volumes:
      - ./api/upanime.db:/app/data/upanime.db
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/upanime.db
      - DOWNLOAD_PATH=/app/data/downloads
      - SCRAPER_DIR=/app/scraper
      - PORT=7891
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  asynqmon:
    image: hibiken/asynqmon
    command: ["--redis-addr=redis:6379"]
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
