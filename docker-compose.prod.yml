services:
  app:
    image: ${UPANIME_IMAGE:-alkindar/upanime:latest}
    pull_policy: always
    ports:
      - "127.0.0.1:7891:7891"
    volumes:
      - upanime-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/upanime.db
      - DOWNLOAD_PATH=/app/data/downloads
      - SCRAPER_DIR=/app/scraper
      - PORT=7891
      - REDIS_ADDR=redis:6379
      - AUTH_COOKIE_SECURE=1
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.upanime.rule=Host(`anime.eduardograngeiro.com.br`)"
      - "traefik.http.routers.upanime.entrypoints=websecure"
      - "traefik.http.routers.upanime.tls.certresolver=letsencrypt"
      - "traefik.http.services.upanime.loadbalancer.server.port=7891"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  upanime-data:
  redis-data:
